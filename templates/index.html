<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Telemetry | AeroMind</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --text: #c9d1d9; --accent: #00ffcc; --healthy: #2ea043; --faulty: #ff3366; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; min-height: 100vh; }
        .dashboard { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        h2 { margin: 0 0 10px 0; color: white; letter-spacing: 2px; }
        p { color: #8b949e; margin: 0; }
        
        .upload-section { display: flex; flex-direction: column; align-items: center; gap: 20px; background: #0d1117; padding: 30px; border-radius: 8px; border: 1px dashed #30363d; }
        .file-box { width: 100%; max-width: 500px; text-align: center; }
        label { display: block; margin-bottom: 15px; color: var(--accent); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="file"] { width: 100%; color: #8b949e; background: #161b22; padding: 10px; border-radius: 5px; border: 1px solid #30363d; }
        
        .upload-btn { background: var(--accent); color: #121212; border: none; padding: 15px 40px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; letter-spacing: 1px; width: 100%; max-width: 500px;}
        .upload-btn:hover { background: #00ccaa; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }

        /* The Live Loader */
        #loader { display: none; text-align: center; padding: 30px; font-family: monospace; color: var(--accent); font-size: 16px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* The Result Display */
        #result-banner { display: none; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase; margin-top: 20px; }
        
        #prediction-panel { display: none; background: #0d1117; padding: 20px; border-radius: 6px; border: 1px solid #30363d; text-align: center; margin-top: 10px; }
        
        /* The Single Massive Graph Area */
        .chart-container { display: none; margin-top: 20px; width: 100%; }
        .chart-box { background: #0d1117; padding: 20px; border-radius: 8px; border: 1px solid #30363d; position: relative; height: 400px; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h2>AEROMIND CLOUD SERVER</h2>
            <p>Predictive Edge-to-Cloud IoT Diagnostic Engine</p>
        </div>
        
        <form id="uploadForm" class="upload-section">
            <div class="file-box">
                <label>Incoming Edge Telemetry (100k Rows)</label>
                <input type="file" id="file_live" name="file_live" accept=".csv" required>
            </div>
            <button type="submit" class="upload-btn">EXECUTE DUAL-ENGINE INFERENCE</button>
        </form>

        <div id="loader">
            <span class="blink">Receiving Payload... Processing FFT Matrix... Running RF/LSTM Inference...</span>
        </div>

        <div id="result-banner"></div>

        <div id="prediction-panel">
            <p style="color: var(--accent); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 5px;">LSTM Lifespan Forecast</p>
            <h3 id="days-remaining" style="margin: 0; color: white; font-family: monospace; font-size: 28px;">--</h3>
        </div>

        <div class="chart-container" id="chartsArea">
            <div class="chart-box"><canvas id="chartLive"></canvas></div>
        </div>
    </div>

    <script>
        let liveChartInstance = null;

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            // UI Reset
            document.getElementById('chartsArea').style.display = 'none';
            document.getElementById('result-banner').style.display = 'none';
            document.getElementById('prediction-panel').style.display = 'none';
            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            // Fake 1.5s delay to make the AI feel heavy and thoughtful
            await new Promise(r => setTimeout(r, 1500));

            const formData = new FormData();
            formData.append('file_live', document.getElementById('file_live').files[0]);

            try {
                // Send the 1 Lakh lines to app.py
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                
                loader.style.display = 'none';

                if(data.error) {
                    alert(data.error);
                    return;
                }

                // 1. Render the Random Forest Diagnosis
                const banner = document.getElementById('result-banner');
                banner.style.display = 'block';
                banner.innerText = data.diagnosis;
                if(data.is_faulty) {
                    banner.style.background = 'rgba(255, 51, 102, 0.1)';
                    banner.style.color = 'var(--faulty)';
                    banner.style.border = '1px solid var(--faulty)';
                } else {
                    banner.style.background = 'rgba(46, 160, 67, 0.1)';
                    banner.style.color = 'var(--healthy)';
                    banner.style.border = '1px solid var(--healthy)';
                }

                // 2. Render the LSTM Forecast
                const predPanel = document.getElementById('prediction-panel');
                const daysText = document.getElementById('days-remaining');
                predPanel.style.display = 'block';
                daysText.innerText = data.days_remaining;
                daysText.style.color = data.is_faulty ? 'var(--faulty)' : 'var(--healthy)';

                // 3. Draw the Massive FFT Frequency Chart
                document.getElementById('chartsArea').style.display = 'block';
                drawChart('chartLive', 'Live FFT Frequency Spectrum (Latest Snapshot)', data.x_axis, data.y_live, data.is_faulty ? '#ff3366' : '#00ffcc', liveChartInstance);

            } catch (err) {
                loader.style.display = 'none';
                alert('Cloud Server Failure: ' + err.message);
            }
        });

        function drawChart(canvasId, title, xData, yData, color, chartInstance) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            if(Chart.getChart(canvasId)) { Chart.getChart(canvasId).destroy(); }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xData.map(val => val.toFixed(1) + ' Hz'),
                    datasets: [{
                        label: 'Amplitude (g)',
                        data: yData,
                        borderColor: color,
                        borderWidth: 2,
                        backgroundColor: color + '22', // Adds a slight glowing fill under the line
                        fill: true,
                        pointRadius: 0, 
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        x: { type: 'number', easing: 'linear', duration: 1000 },
                        y: { type: 'number', easing: 'easeOutQuart', duration: 1500 }
                    },
                    plugins: {
                        title: { display: true, text: title, color: '#c9d1d9', font: {size: 18, family: 'monospace'} },
                        legend: { display: false }
                    },
                    scales: {
                        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', maxTicksLimit: 20 } },
                        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' }, min: 0 }
                    }
                }
            });
        }
    </script>
</body>
</html>
