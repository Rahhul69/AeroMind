<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Telemetry | Wind Energy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --text: #c9d1d9; --accent: #58a6ff; --healthy: #2ea043; --faulty: #f85149; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; min-height: 100vh; }
        .dashboard { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 20px; }
        .header { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        h2 { margin: 0 0 10px 0; color: white; letter-spacing: 1px; }
        p { color: #8b949e; margin: 0; }
        
        .upload-section { display: flex; gap: 20px; background: #0d1117; padding: 20px; border-radius: 8px; border: 1px dashed #30363d; }
        .file-box { flex: 1; }
        label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; font-size: 13px; text-transform: uppercase; }
        input[type="file"] { width: 100%; color: #8b949e; }
        
        .upload-btn { background: var(--accent); color: white; border: none; padding: 0 30px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .upload-btn:hover { background: #388bfd; }

        /* The Live Loader */
        #loader { display: none; text-align: center; padding: 30px; font-family: monospace; color: var(--accent); font-size: 16px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* The Result Display */
        #result-banner { display: none; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase; }
        
        /* The Graphs Area */
        .chart-container { display: none; gap: 20px; margin-top: 20px; }
        .chart-box { flex: 1; background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid #30363d; position: relative; height: 300px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h2>WIND ENERGY ANALYTICS ENGINE</h2>
            <p>Live Telemetry Ingestion & Random Forest Classification</p>
        </div>

        <form id="uploadForm" class="upload-section">
            <div class="file-box">
                <label>1. System Baseline (Digital Twin)</label>
                <input type="file" id="file_baseline" name="file_baseline" accept=".csv" required>
            </div>
            <div class="file-box">
                <label>2. Live Turbine Telemetry</label>
                <input type="file" id="file_live" name="file_live" accept=".csv" required>
            </div>
            <button type="submit" class="upload-btn">RUN AI ANALYSIS</button>
        </form>

        <div id="loader">
            <span class="blink">Initializing Fast Fourier Transform... Extracting Features... Running Neural Inference...</span>
        </div>

        <div id="result-banner"></div>

        <div id="prediction-panel" style="display: none; background: #0d1117; padding: 15px; border-radius: 6px; border: 1px solid #30363d; text-align: center; margin-top: 10px;">
            <p style="color: var(--accent); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 5px;">LSTM Predictive Forecaster</p>
            <h3 id="days-remaining" style="margin: 0; color: white; font-family: monospace; font-size: 24px;">--</h3>
        </div>

        <div class="chart-container" id="chartsArea">
            <div class="chart-box"><canvas id="chartBase"></canvas></div>
            <div class="chart-box"><canvas id="chartLive"></canvas></div>
        </div>
    </div>

    <script>
        let baseChartInstance = null;
        let liveChartInstance = null;

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page from reloading
            
            // Hide old results, show loader
            document.getElementById('chartsArea').style.display = 'none';
            document.getElementById('result-banner').style.display = 'none';
            document.getElementById('prediction-panel').style.display = 'none';
            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            // Fake a 1.5 second delay to build suspense and feel "heavy"
            await new Promise(r => setTimeout(r, 1500));

            const formData = new FormData();
            formData.append('file_baseline', document.getElementById('file_baseline').files[0]);
            formData.append('file_live', document.getElementById('file_live').files[0]);

            try {
                // Send data invisibly to Python server
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                
                loader.style.display = 'none';

                if(data.error) {
                    alert(data.error);
                    return;
                }

                // Show Results Banner
                const banner = document.getElementById('result-banner');
                banner.style.display = 'block';
                banner.innerText = data.diagnosis;
                if(data.is_faulty) {
                    banner.style.background = 'rgba(248, 81, 73, 0.1)';
                    banner.style.color = '#f85149';
                    banner.style.border = '1px solid #f85149';
                } else {
                    banner.style.background = 'rgba(46, 160, 67, 0.1)';
                    banner.style.color = '#2ea043';
                    banner.style.border = '1px solid #2ea043';
                }

                // Show the LSTM Prediction Panel
                const predPanel = document.getElementById('prediction-panel');
                const daysText = document.getElementById('days-remaining');
                predPanel.style.display = 'block';
                daysText.innerText = data.days_remaining;
                
                if(data.is_faulty) {
                    daysText.style.color = '#f85149';
                } else {
                    daysText.style.color = '#2ea043';
                }

                // Show Charts Area
                document.getElementById('chartsArea').style.display = 'flex';
                
                // Draw the Animated Charts
                drawChart('chartBase', 'Digital Twin Baseline', data.x_axis, data.y_base, '#2ea043', baseChartInstance);
                drawChart('chartLive', 'Live Telemetry Feed', data.x_axis, data.y_live, data.is_faulty ? '#f85149' : '#2ea043', liveChartInstance);

            } catch (err) {
                loader.style.display = 'none';
                alert('System Failure: ' + err.message);
            }
        });

        // The Engine that handles the smooth drawing animations
        function drawChart(canvasId, title, xData, yData, color, chartInstance) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Destroy old chart if it exists so we can draw a fresh one
            if(Chart.getChart(canvasId)) { Chart.getChart(canvasId).destroy(); }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xData.map(val => val.toFixed(1)), // Format X axis
                    datasets: [{
                        label: 'Amplitude',
                        data: yData,
                        borderColor: color,
                        borderWidth: 2,
                        pointRadius: 0, // Hide dots to make it look like a smooth continuous wave
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        x: { type: 'number', easing: 'linear', duration: 1500 },
                        y: { type: 'number', easing: 'easeOutBounce', duration: 1500 }
                    },
                    plugins: {
                        title: { display: true, text: title, color: '#c9d1d9', font: {size: 16} },
                        legend: { display: false }
                    },
                    scales: {
                        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', maxTicksLimit: 10 } },
                        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' }, min: 0 }
                    }
                }
            });
        }
    </script>
</body>
</html>
